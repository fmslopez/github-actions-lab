name: Frontend CI
# Nombre del workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    # Condición 1: Solo se dispara si hay cambios en esta carpeta específica
    paths:
      - 'hangman-front/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # O la versión que use tu proyecto
          cache: 'npm'
          cache-dependency-path: 'hangman-front/package-lock.json'

      # 3. Instalar dependencias
      # Nota: Usamos working-directory porque el package.json no está en la raíz
      - name: Install dependencies
        run: npm install
        working-directory: ./hangman-front

      # 4. Ejecutar tests unitarios
      - name: Run unit tests
        run: npm test
        working-directory: ./hangman-front

      # 5. Build del proyecto
      - name: Build frontend
        run: npm run build
        working-directory: ./hangman-front
